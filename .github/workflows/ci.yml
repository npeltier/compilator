name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on a branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install ffmpeg (used to synth fixtures in the e2e test)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install root deps
        run: npm ci

      - name: Install functions deps
        run: npm ci
        working-directory: functions

      - name: Unit tests (Jest, functions/)
        run: npm test
        working-directory: functions

      - name: E2E (emulators + seed + integration test)
        run: |
          npx firebase emulators:exec \
            --only auth,functions,firestore,hosting,storage \
            --project demo-compilator \
            "npm run seed && npm run test:e2e"

  deploy:
    name: Deploy to Firebase
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install functions deps
        run: npm ci
        working-directory: functions

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COMPILATOR_83816 }}

      - name: Deploy rules, storage, functions, hosting
        run: |
          npx firebase deploy \
            --only firestore:rules,storage,functions,hosting \
            --project compilator-83816 \
            --non-interactive \
            --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
