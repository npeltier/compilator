<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profil — Compilator</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="/">Compilator</a>
    <div class="nav-links">
      <a href="/upload.html">Prochaine compil</a>
      <a href="/migrate.html" data-admin-only>Import</a>
      <a href="/profile.html">Profil</a>
      <a href="#" id="logout">Déconnexion</a>
    </div>
  </nav>

  <main class="shell-narrow">
    <p class="eyebrow">Profil</p>
    <h1>Qui tu es.</h1>

    <div id="error" class="error" hidden></div>
    <div id="ok" class="notice" hidden>Enregistré.</div>

    <form id="form">
      <label for="email">Adresse e-mail</label>
      <input id="email" disabled>

      <label for="displayName" style="margin-top:24px;">Nom d'affichage</label>
      <input id="displayName" placeholder="Nicolas P." required>
      <p style="color:var(--ink-faint);font-size:12px;margin-top:6px;">
        Affiché comme auteur des compilations que tu envoies. Utilise la même forme que sur l'ancien site
        (ex. <i>Nicolas P.</i>, <i>François D.</i>, <i>Céline</i>) pour que les anciennes et nouvelles compilations se regroupent.
      </p>

      <button type="submit" class="btn-accent" style="margin-top:24px;">Enregistrer</button>
    </form>
  </main>

  <script type="module">
    import { auth, db } from '/js/firebase-init.js';
    import { requireAuth, logout } from '/js/auth-guard.js';
    import { doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

    document.getElementById('logout').addEventListener('click', (e) => { e.preventDefault(); logout(); });
    const user = await requireAuth();

    const userDocRef = doc(db, 'users', user.uid);
    const userDocSnap = await getDoc(userDocRef);
    const data = userDocSnap.exists() ? userDocSnap.data() : {};
    document.getElementById('email').value = user.email;
    document.getElementById('displayName').value = data.displayName || user.email.split('@')[0];

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      const okEl = document.getElementById('ok');
      errEl.hidden = true; okEl.hidden = true;
      const displayName = document.getElementById('displayName').value.trim();
      if (!displayName) return;
      try {
        await setDoc(userDocRef, { displayName, updatedAt: serverTimestamp() }, { merge: true });
        okEl.hidden = false;
      } catch (err) {
        errEl.textContent = err.message; errEl.hidden = false;
      }
    });
  </script>
</body>
</html>
