<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compilator — connexion</title>
  <link rel="stylesheet" href="/css/app.css">
  <meta name="build-commit" content="dev">
  <meta name="build-time" content="dev">
</head>
<body>
  <main class="login-card">
    <h1>Compilator</h1>
    <p class="tagline" id="hint">La discothèque des stooges enfin en ligne.</p>

    <div id="error" class="error" hidden></div>
    <div id="notice" class="notice" hidden></div>

    <form id="form">
      <label for="email">Adresse e-mail</label>
      <input id="email" type="email" autocomplete="email" required>

      <div id="passwordRow">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" autocomplete="current-password" minlength="6">
      </div>

      <button type="submit" id="submit" class="btn-accent">Se connecter</button>
    </form>

    <p class="alt" id="altDefault">
      <a href="#" id="toggle">Créer un compte</a>
      <span style="color:var(--ink-faint);margin:0 8px;">·</span>
      <a href="#" id="reset">Première connexion / mot de passe oublié</a>
    </p>
    <p class="alt" id="altReset" hidden>
      <a href="#" id="backToSignin">← Retour à la connexion</a>
    </p>
  </main>

  <script type="module">
    import { auth } from '/js/firebase-init.js';
    import { isAllowlisted, recordAccessRequest } from '/js/auth-guard.js';
    import {
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      sendPasswordResetEmail,
      signOut,
    } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
    import { doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';
    import { db } from '/js/firebase-init.js';

    const form = document.getElementById('form');
    const errorEl = document.getElementById('error');
    const noticeEl = document.getElementById('notice');
    const hintEl = document.getElementById('hint');
    const passwordRow = document.getElementById('passwordRow');
    const passwordEl = document.getElementById('password');
    const toggle = document.getElementById('toggle');
    const reset = document.getElementById('reset');
    const backToSignin = document.getElementById('backToSignin');
    const altDefault = document.getElementById('altDefault');
    const altReset = document.getElementById('altReset');
    const submit = document.getElementById('submit');

    const DEFAULT_HINT = 'La discothèque des stooges enfin en ligne.';
    let mode = 'signin'; // 'signin' | 'signup' | 'reset'

    const params = new URLSearchParams(location.search);
    if (params.get('error') === 'not_allowlisted') {
      showError("Votre compte n'est pas autorisé sur ce site. Votre demande a été transmise à Nicolas — il pourra vous autoriser.");
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      if (await isAllowlisted(user.email)) {
        const next = params.get('next') || '/';
        location.replace(next);
      } else {
        await recordAccessRequest();
        await signOut(auth);
        showError("Cette adresse n'est pas autorisée. Ta demande a été transmise à Nicolas — il pourra t'autoriser.");
        submit.disabled = false;
      }
    });

    // Swap the card between sign-in, sign-up and the dedicated reset screen.
    // The reset screen hides the password field entirely so the only thing to
    // do is type the email and hit "Envoyer le lien" — the smooth first-use and
    // forgotten-password path.
    function setMode(next) {
      mode = next;
      clearError();
      clearNotice();
      const isReset = mode === 'reset';
      passwordRow.hidden = isReset;
      passwordEl.required = !isReset;
      submit.disabled = false;
      altDefault.hidden = isReset;
      altReset.hidden = !isReset;
      if (mode === 'reset') {
        hintEl.textContent = "Première connexion ou mot de passe oublié ? Saisis ton adresse e-mail, on t'envoie un lien pour définir ton mot de passe.";
        submit.textContent = 'Envoyer le lien';
      } else if (mode === 'signup') {
        hintEl.textContent = DEFAULT_HINT;
        submit.textContent = 'Créer le compte';
        toggle.textContent = 'Déjà inscrit ? Se connecter';
      } else {
        hintEl.textContent = DEFAULT_HINT;
        submit.textContent = 'Se connecter';
        toggle.textContent = 'Créer un compte';
      }
    }

    toggle.addEventListener('click', (e) => {
      e.preventDefault();
      setMode(mode === 'signin' ? 'signup' : 'signin');
    });

    reset.addEventListener('click', (e) => {
      e.preventDefault();
      setMode('reset');
      document.getElementById('email').focus();
    });

    backToSignin.addEventListener('click', (e) => {
      e.preventDefault();
      setMode('signin');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      clearNotice();
      submit.disabled = true;
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = passwordEl.value;

      try {
        if (mode === 'reset') {
          await sendPasswordResetEmail(auth, email);
          noticeEl.textContent = `Un e-mail pour définir ton mot de passe a été envoyé à ${email}. Vérifie ta boîte (et les spams), puis reviens te connecter.`;
          noticeEl.hidden = false;
          submit.disabled = false;
          return;
        }
        if (mode === 'signin') {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          await createUserWithEmailAndPassword(auth, email, password);
          if (!(await isAllowlisted(email))) {
            await recordAccessRequest();
            await signOut(auth);
            throw new Error("Cette adresse n'est pas autorisée. Ta demande a été transmise à Nicolas — il pourra t'autoriser.");
          }
          await setDoc(doc(db, 'users', email), {
            displayName: email.split('@')[0],
            updatedAt: serverTimestamp(),
          }, { merge: true });
        }
        // onAuthStateChanged above handles the redirect (or sign-out if not allowlisted).
      } catch (err) {
        showError(err.message || String(err));
        submit.disabled = false;
      }
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.hidden = false;
    }
    function clearError() {
      errorEl.hidden = true;
      errorEl.textContent = '';
    }
    function clearNotice() {
      noticeEl.hidden = true;
      noticeEl.textContent = '';
    }
  </script>
</body>
</html>
