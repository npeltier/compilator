<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compilation — Compilator</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="/">Compilator</a>
    <div class="nav-links">
      <a href="/upload.html">Prochaine compil</a>
      <a href="/migrate.html" data-admin-only>Import</a>
      <a href="/profile.html">Profil</a>
      <a href="#" id="logout">Déconnexion</a>
    </div>
  </nav>

  <main class="shell" id="main" style="padding-bottom:160px"></main>

  <script type="module">
    import { db, storage } from '/js/firebase-init.js';
    import { requireAuth, logout } from '/js/auth-guard.js';
    import { setQueue, playAt } from '/js/player.js';
    import { doc, getDoc, collection, getDocs, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';
    import { ref as storageRef, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-storage.js';

    document.getElementById('logout').addEventListener('click', (e) => { e.preventDefault(); logout(); });
    await requireAuth();

    const id = new URLSearchParams(location.search).get('id');
    const main = document.getElementById('main');
    if (!id) { main.innerHTML = '<div class="notice">Aucun identifiant de compilation dans l\'URL.</div>'; throw new Error('missing id'); }

    const compSnap = await getDoc(doc(db, 'compilations', id));
    if (!compSnap.exists()) {
      main.innerHTML = '<div class="notice">Compilation introuvable.</div>';
      throw new Error('not found');
    }
    const comp = { id, ...compSnap.data() };

    const tracksSnap = await getDocs(query(collection(db, 'compilations', id, 'tracks'), orderBy('order', 'asc')));
    const tracks = await Promise.all(tracksSnap.docs.map(async d => {
      const t = d.data();
      const song = await getDoc(doc(db, 'songs', t.songId));
      return {
        order: t.order,
        title: t.title || song.data()?.title || 'Sans titre',
        artist: t.artist || song.data()?.artist || '',
        duration: t.duration || song.data()?.duration || 0,
        storagePath: song.data()?.storagePath,
      };
    }));

    const fmt = (s) => isFinite(s) ? `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}` : '';
    const totalDur = tracks.reduce((a, t) => a + (t.duration || 0), 0);

    main.innerHTML = `
      <div class="detail-hero">
        <div class="art ${comp.coverPath ? '' : 'placeholder'}" id="hero-art"></div>
        <div class="meta">
          <p class="eyebrow">${comp.season === 'noel' ? '❄ Noël' : '☀ Été'} ${comp.year || ''}</p>
          <h1>${escape(comp.title)}</h1>
          <div class="by">par <a href="/?author=${encodeURIComponent(comp.authorName)}">${escape(comp.authorName)}</a></div>
          <div class="stats">${tracks.length} morceau${tracks.length > 1 ? 'x' : ''} · ${fmt(totalDur)}</div>
          <div style="margin-top:24px;">
            <button class="btn-accent" id="playAll">▶ Tout écouter</button>
          </div>
        </div>
      </div>
      <ol class="tracklist" id="tracks"></ol>
    `;

    if (comp.coverPath) {
      try {
        const url = await getDownloadURL(storageRef(storage, comp.coverPath));
        document.getElementById('hero-art').style.backgroundImage = `url(${url})`;
      } catch (e) { /* ignore */ }
    } else {
      document.getElementById('hero-art').textContent = (comp.title || '?')[0].toUpperCase();
    }

    const tracksEl = document.getElementById('tracks');
    tracks.forEach((t, i) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="num">${i + 1}</span>
        <div>
          <div class="title">${escape(t.title)}</div>
          <div class="artist">${escape(t.artist)}</div>
        </div>
        <span class="dur">${fmt(t.duration)}</span>
      `;
      li.addEventListener('click', () => playAt(i));
      tracksEl.appendChild(li);
      t.li = li;
    });
    setQueue(tracks);

    document.getElementById('playAll').addEventListener('click', () => playAt(0));

    function escape(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
  </script>
</body>
</html>
